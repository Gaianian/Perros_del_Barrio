<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Important for phone responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Perros del Barrio</title>

  <link rel="icon" type="image/png" href="favicon.PNG">

  <!-- Facebook / social preview -->
  <meta property="og:title" content="Perros del Barrio">
  <meta property="og:description" content="Encuentre y reporte perros comunitarios en Cuenca.">
  <meta property="og:image" content="https://gaianian.github.io/Perros_del_Barrio/Preview.PNG">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://gaianian.github.io/Perros_del_Barrio/">
  <meta property="og:type" content="website">

  <meta name="description" content="Encuentre y reporte perros comunitarios en Cuenca.">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .site-header {
      background: #2f6573;
      color: white;
      padding: 10px 14px;
      text-align: center;
      flex: 0 0 auto;
    }

    .site-header h1 {
      margin: 0;
      font-size: 1.4rem;
      line-height: 1.2;
    }

    .site-header p {
      margin: 4px 0 0;
      font-size: 0.95rem;
    }

    .app-container {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
    }

    .app-container iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Phone layout */
    @media (max-width: 600px) {
      .site-header {
        padding: 8px 10px;
      }

      .site-header h1 {
        font-size: 1.1rem;
      }

      .site-header p {
        font-size: 0.8rem;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <h1>Perros del Barrio</h1>
    <p>Encuentre y reporte perros comunitarios en Cuenca</p>
  </header>

  <main class="app-container">
    <iframe
      src="https://arcg.is/1nfLby4"
      allowfullscreen>
    </iframe>
  </main>

</body>
</html>
